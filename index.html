    <style>
        *{
    margin: 0;
    padding: 0;
}
html,body{
    width: 100%;
    height: 100%;
    font-family: Arial, Helvetica, sans-serif;
    background-color: black; 
    font-optical-sizing: auto;
    font-style: normal; 
    scroll-behavior: smooth;
}
audio{
    position: absolute;
    z-index: -1000;
}
#hbd{
    height: 100%;
    position: fixed;
    display: flex;
    flex-direction: column;
    align-items: start;
    justify-content: center;
    z-index: 100;
}
#hbd>img{
    height: 25px;
    filter: drop-shadow(0px 5px 10px pink);
    animation: heart1 3s infinite linear;
}
@keyframes heart1 {
    25%{
        transform: rotate(10deg);
    } 
    75%{
        transform: rotate(-20deg);
    }
}
.baloons{
    left: -120px;
    position: fixed;
    top: 50px;
    height: 1000px;
}
.heartBaloons{
    top: 100vh;
    left: 50%;
    transform: translate(-50%);
    position: fixed;
    height: 1000px;
    z-index: 100;
    transition: 3s ease;
}
#main>h1{
    padding: 0 0 30px 0;
    text-align: center;
    font-size: 60px;
    color: white;
}
#content{
    width: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}
#content #grp{
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: url(/images/Alpha/line.svg);
    background-position: center;
    /* background-repeat: no-repeat; */
}
#content img{
    height: 600px;
}
#p1,
#p4,
#us2,
#us3,
#us5{
    transform: rotate(10deg);
}
#us1,
#us4,
#p2,
#p3{
    transform: rotate(-10deg);
}
#p1{
    filter: drop-shadow(10px 10px 20px black);
}
#p2,
#p3{
    filter: drop-shadow(-10px 10px 20px black);
}
#p2{
    margin-top: 50px;
}
#button{
    z-index: 100;
    height: 50px;
    width: 100px;
    background-color: rgb(73, 7, 7);
    border-radius: 20px;
    border: 2px solid white;
    color: rgb(255, 255, 255);
}
    </style>
    <title>Pagli</title>
</head>
<body>
        <img src="images/Alpha/baloons.svg" class="baloons" alt="" srcset="">
        <img src="images/Alpha/heart baloons.svg" class="heartBaloons" alt="" srcset="">

        <h1>Meri Bhangan</h1>

            <div id="grp">
                <img src="./images/Alpha/page1.svg" id="p1" alt="">

                <img src="./images/Alpha/page3.svg" id="p3" alt="">

            </div>

};
